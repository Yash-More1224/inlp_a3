model:
  embedding_dim: 256
  hidden_size: 512
  dropout: 0.3
  num_layers: 2
  bidirectional: true

training:
  seed: 42
  device: cuda
  epochs: 60
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler_step: 15
  scheduler_gamma: 0.5

data:
  data_dir: data
  seq_len: 32
  step: 32
  train_ratio: 0.8
  val_ratio: 0.1

output:
  base_dir: outputs
  checkpoint_path: outputs/logs/checkpoints/task1_{model}.pt

logging:
  use_wandb: true
  project: inlp-assignment3

hf:
  push: false
  repo_id: ""
  token: null
