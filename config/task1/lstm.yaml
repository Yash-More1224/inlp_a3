model:
  embedding_dim: 128
  hidden_size: 256
  dropout: 0.4

training:
  seed: 42
  device: cuda
  epochs: 40
  batch_size: 64
  learning_rate: 0.0005

data:
  data_dir: data
  seq_len: 64
  step: 64
  train_ratio: 0.8
  val_ratio: 0.1

output:
  base_dir: outputs
  checkpoint_path: outputs/logs/checkpoints/task1_{model}.pt

logging:
  use_wandb: true
  project: inlp-assignment3

hf:
  push: false
  repo_id: ""
  token: null
