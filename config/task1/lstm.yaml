model:
  embedding_dim: 256
  hidden_size: 512
  dropout: 0.2

training:
  seed: 42
  device: cuda
  epochs: 50
  batch_size: 64
  learning_rate: 0.001

data:
  data_dir: data
  seq_len: 128
  step: 128
  train_ratio: 0.8
  val_ratio: 0.1

output:
  base_dir: outputs
  checkpoint_path: outputs/logs/checkpoints/task1_{model}.pt

logging:
  use_wandb: true
  project: inlp-assignment3

hf:
  push: false
  repo_id: ""
  token: null
